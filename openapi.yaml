                    items:
                        type: string
                    type: array
                blocked_merchant_category_codes:
                    description: List of blocked merchant category codes (MCCs). Transactions with these MCCs will be declined
                    items:
                        type: string
                    type: array
                blocked_merchant_country_codes:
                    description: List of blocked merchant country codes. Transactions from these countries will be declined
                    items:
                        type: string
                    type: array
                blocked_merchant_currency_codes:
                    description: List of blocked merchant currency codes. Transactions in these currencies will be declined
                    items:
                        type: string
                    type: array
                blocked_merchant_ids:
                    description: List of blocked merchant identifiers. Transactions from these specific merchants will be declined
                    items:
                        type: string
                    type: array
