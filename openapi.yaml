                    description: Addresses need to adhere to character validation, as addresses are used across multiple payment rails. Characters are validated according to the Fedwire character validation.
                beneficial_owners:
                    description: A list of all the persons who have ultimate control over funds in the business, whether through ownership or other means. This is anyone who owns 25% or more of the business and those who control the funds. If no one owns more than 25% of the business, just the individual who has ultimate control of the funds must be included.
                    items:
                        $ref: '#/components/schemas/BusinessAssociatedPerson'
