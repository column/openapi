                first_activated_at:
                    description: The timestamp when the card was first activated
                    format: date-time
                    nullable: true
                    type: string
                id:
                    description: The ID of the card
                    example: card_2x8gszy5folpA9s0TOCseE9ABDM
                    pattern: ^card_[0-9A-Za-z]{26}$
