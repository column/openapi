                inactive_reason:
                    description: 'The reason why the card is inactive. Possible values: `deactivated`, `expired`, `lost`, `stolen`, `damaged`, `replaced`'
                    nullable: true
                    type: string
                last_active_at:
                    description: Timestamp when the card was last set to active status
                    format: date-time
                    nullable: true
                    type: string
                last_four_digits:
                    description: The last four digits of the card PAN
                    example: "1234"
                    pattern: ^[0-9]{4}$
                    type: string
                last_inactive_at:
                    description: Timestamp when the card was last set to inactive status
                    format: date-time
                    nullable: true
                    type: string
                last_paused_at:
                    description: Timestamp when the card was last set to paused status
                    format: date-time
                    nullable: true
                    type: string
                manufacturing_details:
                    $ref: '#/components/schemas/ManufacturingDetails'
                    description: Manufacturing and shipping details for physical cards. This field is `null` for virtual cards
                    nullable: true
                original_card_id:
                    description: The ID of the card that this card replaced. Populated on the replacement card
                    example: card_2x8gszy5folpA9s0TOCseE9ABDM
                    nullable: true
                    pattern: ^card_[0-9A-Za-z]{26}$
                    type: string
                platform_id:
                    description: The ID of the platform that owns this card
                    type: string
                replacement_card_id:
                    description: The ID of the card that replaced this one. Populated on the original card after replacement
                    example: card_2x8gszy5folpA9s0TOCseE9ABDM
                    nullable: true
                    pattern: ^card_[0-9A-Za-z]{26}$
                    type: string
                replacement_reason:
