                    description: List of allowed merchant country codes. If specified, only transactions from these countries will be allowed
                    items:
                        type: string
                    type: array
                allowed_merchant_currency_codes:
                    description: List of allowed merchant currency codes. If specified, only transactions in these currencies will be allowed
                    items:
                        type: string
                    type: array
