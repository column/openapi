                    pattern: ^capol_[0-9A-Za-z]{26}$
                    type: string
                card_program_id:
                    description: The ID of the card program
                    example: cpgm_2x8gszy5folpA9s0TOCseE9ABDM
                    pattern: ^cpgm_[0-9A-Za-z]{26}$
                    type: string
                created_at:
                    description: The creation date of the card
